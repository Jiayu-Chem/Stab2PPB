name: BA-DDG
channels:
  - pytorch
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # 明确限制 Python 版本，这是打破死锁的关键
  - python=3.9
  - pytorch
  - cudatoolkit=11.3
  - pip
  
  # 将容易引发依赖冲突的老版本纯 Python 包交给 pip 处理
  - pip:
    - pandas==1.2.4
    - numpy==1.20.1
    - tqdm==4.59.0
    - biopython==1.79
    - scikit-learn==0.24.1
    - easydict==1.9 
    - pyyaml
    - wandb